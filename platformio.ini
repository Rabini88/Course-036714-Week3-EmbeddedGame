[platformio]
; Redirect all build artifacts to a short ASCII path to avoid Windows MAX_PATH issues
; caused by Hebrew characters in the OneDrive project path.
build_dir = C:/pio_ws/build
libdeps_dir = C:/pio_ws/libdeps
build_cache_dir = C:/pio_ws/cache

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.9
    adafruit/Adafruit GFX Library @ ^1.11.9
